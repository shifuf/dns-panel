name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next release tag
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const fallbackTag = "v0.02";
            const rawTags = await github.paginate(github.rest.repos.listTags, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const releaseTags = rawTags
              .map((tag) => tag.name)
              .filter((tag) => /^v\d+(?:\.\d+){1,2}$/.test(tag));

            const parseTag = (tag) => tag.slice(1).split(".").map((segment) => Number(segment));
            const compareTags = (left, right) => {
              const a = parseTag(left);
              const b = parseTag(right);
              const maxLength = Math.max(a.length, b.length);
              for (let i = 0; i < maxLength; i += 1) {
                const leftPart = a[i] ?? 0;
                const rightPart = b[i] ?? 0;
                if (leftPart !== rightPart) {
                  return leftPart - rightPart;
                }
              }
              return 0;
            };

            if (releaseTags.length === 0) {
              core.info(`No prior release tag found, using ${fallbackTag}`);
              core.setOutput("previous_tag", "");
              core.setOutput("tag", fallbackTag);
              return;
            }

            const latestTag = releaseTags.sort(compareTags).at(-1);
            const latestParts = latestTag.slice(1).split(".");
            const bumpedParts = latestParts.map((segment) => Number(segment));
            const lastIndex = bumpedParts.length - 1;
            bumpedParts[lastIndex] += 1;

            const formattedParts = latestParts.map((segment, index) => {
              const nextValue = String(bumpedParts[index]);
              if (index !== lastIndex) {
                return nextValue;
              }
              return nextValue.padStart(Math.max(segment.length, nextValue.length), "0");
            });

            const nextTag = `v${formattedParts.join(".")}`;
            core.info(`Latest release tag ${latestTag}, next release tag ${nextTag}`);
            core.setOutput("previous_tag", latestTag);
            core.setOutput("tag", nextTag);

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          notes_file="release-assets/release-notes.md"
          mkdir -p release-assets

          current_tag="${{ steps.version.outputs.tag }}"
          previous_tag="${{ steps.version.outputs.previous_tag }}"

          {
            echo "# ${current_tag}"
            echo
            echo "## 更新内容"
            echo

            if [ -n "$previous_tag" ]; then
              if git rev-list --count "${previous_tag}..${GITHUB_SHA}" >/dev/null 2>&1 && [ "$(git rev-list --count "${previous_tag}..${GITHUB_SHA}")" -gt 0 ]; then
                git log "${previous_tag}..${GITHUB_SHA}" --reverse --pretty=format:'- %s (%h)'
              else
                echo "- 无代码变更"
              fi
            else
              git log "${GITHUB_SHA}" --reverse --pretty=format:'- %s (%h)'
            fi

            echo
            echo
            echo "## 构建产物"
            echo
            echo "- frontend-build.zip"
            echo "- backend-build.zip"
          } > "$notes_file"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend package
        working-directory: frontend
        run: |
          npm ci
          npm run build
          mkdir -p ../release-assets
          cd dist
          zip -r ../../release-assets/frontend-build.zip .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Build backend package
        working-directory: backend
        run: |
          pip install -r requirements.txt
          mkdir -p ../release-assets
          zip -r ../release-assets/backend-build.zip . -x "db/*" "__pycache__/*" "*.pyc"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: release-assets/release-notes.md
          files: |
            release-assets/frontend-build.zip
            release-assets/backend-build.zip
